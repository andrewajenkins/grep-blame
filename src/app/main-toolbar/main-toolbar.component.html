<mat-toolbar class="main-toolbar" fxLayout="column" fxLayoutGap="25px" color="primary">
  <span>Git Admin</span>
  <button mat-icon-button (click)="toggleTheme()" class="example-icon" aria-label="Example icon-button with menu icon">
    <span class="material-symbols-outlined"> light_mode </span>
  </button>
  <button mat-icon-button class="example-icon" aria-label="Example icon-button with menu icon">
    <span class="material-symbols-outlined"> quick_reference_all </span>
  </button>
  <button mat-icon-button (click)="gitBlame()" class="example-icon" aria-label="Example icon-button with menu icon">
    <span class="material-symbols-outlined"> info </span>
  </button>
</mat-toolbar>
